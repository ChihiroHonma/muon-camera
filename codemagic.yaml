workflows:
  ios-workflow:
    name: ZERO Cam iOS Workflow
    max_build_duration: 60
    instance_type: mac_mini_m2
    integrations:
      # Codemagic の「Settings > Integrations > Developer Portal」で
      # API キーを登録した際につけた名前をここに指定する
      app_store_connect: Codemagic
    environment:
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.kanaeru.zerocam
      vars:
        XCODE_PROJECT: "ios/App/App.xcodeproj"
        XCODE_SCHEME: "App"
      node: latest
      xcode: latest
    scripts:
      - name: Install npm dependencies
        script: npm install
      - name: Sync Capacitor iOS project
        script: npx cap sync ios
      - name: Set up code signing
        script: xcode-project use-profiles
      - name: Increment build number
        script: |
          cd "$CM_BUILD_DIR/ios/App"
          agvtool new-version -all "$BUILD_NUMBER"
      - name: Build ipa for distribution
        script: |
          xcode-project build-ipa \
            --project "$XCODE_PROJECT" \
            --scheme "$XCODE_SCHEME"
    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
        # 実機（TestFlight）でマナーモード連動シャッター音の動作を確認してから
        # submit_to_app_store: true に変更し本申請に進む
