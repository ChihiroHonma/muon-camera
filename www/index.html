<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="ZERO Camera">
  <meta name="theme-color" content="#000000">
  <title>ZERO Camera</title>
  <link rel="manifest" href="./manifest.json">
  <link rel="apple-touch-icon" href="./icons/icon.svg">
  <link rel="stylesheet" href="./css/style.css">
</head>
<body>

  <!-- ===== CAMERA SCREEN ===== -->
  <div id="camera-screen" class="screen">

    <!-- Top bar -->
    <div id="top-bar">
      <button id="ratio-btn" class="icon-btn" aria-label="画角">
        <span class="icon"><span class="ratio-label">1:1</span></span>
      </button>
      <button id="flash-btn" class="icon-btn">
        <span class="icon">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="24" height="24">
            <path d="M11 2 L2 14 H10 L8 22 L20 10 H12 Z" fill="currentColor"/>
            <line class="flash-strike" x1="3" y1="21" x2="21" y2="3"
              stroke="currentColor" stroke-width="2.5" stroke-linecap="round"/>
          </svg>
        </span>
        <span class="label">フラッシュ</span>
      </button>
      <button id="timer-btn" class="icon-btn">
        <span class="icon">⏱</span>
        <span class="label">タイマー</span>
      </button>
      <button id="flip-btn" class="icon-btn" aria-label="カメラ切替">
        <span class="icon">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="28" height="28" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
            <path d="M6.5 4.5 C8.5 2 12 1.5 15 3"/>
            <polyline points="14.5,0.5 14.5,3 17,3"/>
            <path d="M17.5 19.5 C15.5 22 12 22.5 9 21"/>
            <polyline points="9.5,23.5 9.5,21 7,21"/>
            <rect x="3" y="8" width="18" height="12" rx="2"/>
            <circle cx="12" cy="14" r="3.5"/>
            <path d="M9.5 8V6.5C9.5 6.2 9.7 6 10 6h4c.3 0 .5.2.5.5V8"/>
          </svg>
        </span>
        <span class="label">切替</span>
      </button>
      <button id="grid-btn" class="icon-btn">
        <span class="icon">⊞</span>
        <span class="label">グリッド</span>
      </button>
    </div>

    <!-- Viewfinder -->
    <div id="viewfinder">

      <!-- Ratio-constrained crop area -->
      <div id="ratio-box">
        <video id="video" autoplay playsinline muted></video>
        <canvas id="grid-canvas"></canvas>
        <div id="countdown-display"></div>
        <div id="recording-indicator" class="hidden" aria-live="polite">
          <span class="rec-dot"></span>
          <span id="recording-time">00:00</span>
        </div>
        <div id="shutter-flash" style="
          position:absolute;inset:0;background:#fff;opacity:0;
          pointer-events:none;transition:opacity 0.08s;z-index:4;
        "></div>
      </div>

      <!-- Sliders (right side, fixed to viewfinder) -->
      <div id="slider-panel">
      <div class="slider-wrap">
        <span class="icon">☀</span>
        <input type="range" id="brightness-slider"
          min="0.5" max="2.0" step="0.05" value="1.0"
          aria-label="明るさ">
      </div>
      <div class="slider-wrap">
        <span class="icon">🔍</span>
        <input type="range" id="zoom-slider"
          min="1" max="5" step="0.1" value="1"
          aria-label="ズーム">
      </div>
    </div><!-- /slider-panel -->
    </div><!-- /viewfinder -->

    <!-- Bottom bar -->
    <div id="bottom-bar">
      <!-- Thumbnail -->
      <button id="thumbnail-btn" aria-label="最後の撮影">
        <img id="thumbnail-img" alt="サムネイル">
        <span id="thumbnail-placeholder">📷</span>
      </button>

      <!-- Shutter + Mode switcher (column group) -->
      <div id="shutter-group">
        <button id="shutter-btn" aria-label="撮影">
          <span id="shutter-icon">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="36" height="36">
              <path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z" fill="#1a1a1a"/>
              <circle cx="12" cy="13" r="4" fill="rgba(255,255,255,0.6)"/>
              <circle cx="12" cy="13" r="2.4" fill="none" stroke="#1a1a1a" stroke-width="1"/>
            </svg>
          </span>
        </button>
        <div id="mode-switcher">
          <div class="mode-track">
            <button class="mode-btn" data-mode="video">ビデオ</button>
            <button class="mode-btn active" data-mode="photo">写真</button>
          </div>
        </div>
      </div>

      <!-- Spacer (balance for thumbnail) -->
      <div class="bottom-spacer"></div>
    </div>

  </div><!-- /camera-screen -->

  <!-- ===== PREVIEW SCREEN ===== -->
  <div id="preview-screen" class="screen hidden">

    <div id="preview-media">
      <img id="preview-image" alt="プレビュー">
      <video id="preview-video" playsinline muted loop></video>
    </div>

    <div id="preview-bottom-bar">
      <button id="retake-btn" class="preview-btn">
        <svg viewBox="0 0 24 24" width="28" height="28" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/>
          <path d="M3 3v5h5"/>
        </svg>
        <span>撮り直し</span>
      </button>
      <button id="save-btn" class="preview-btn">
        <svg viewBox="0 0 24 24" width="28" height="28" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
          <polyline points="7 10 12 15 17 10"/>
          <line x1="12" y1="15" x2="12" y2="3"/>
        </svg>
        <span>保存</span>
      </button>
      <button id="share-btn" class="preview-btn">
        <svg viewBox="0 0 24 24" width="28" height="28" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M4 12v8a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2v-8"/>
          <polyline points="16 6 12 2 8 6"/>
          <line x1="12" y1="2" x2="12" y2="15"/>
        </svg>
        <span>共有</span>
      </button>
    </div>

  </div><!-- /preview-screen -->

  <!-- Hidden canvas for capture -->
  <canvas id="capture-canvas"></canvas>

  <!-- Toast -->
  <div id="toast"></div>

  <script src="./js/capacitor.js"></script>
  <script src="./js/app.js"></script>
</body>
</html>
